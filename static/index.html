<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAP IntelliOps — Multi-Agent Incident Resolver</title>
<style>
  :root{
    --shell:#354a5f; --shell-text:#fff;
    --bg:#f5f6f7; --card:#fff; --border:#e5e5e5; --border-strong:#d9d9d9;
    --blue:#0a6ed1; --blue-dark:#0854a0;
    --text:#32363a; --muted:#6a6d70;
    --good:#107e3e; --good-bg:#f1faf1;
    --warn:#e9730c; --warn-bg:#fef7f1;
    --bad:#bb0000; --bad-bg:#ffebeb;
    --code-bg:#f4f4f5; --code-border:#e0e0e0;
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);
    font-family:"72","72full",-apple-system,"Segoe UI",Roboto,sans-serif;margin:0}
  /* Fiori shell bar */
  .shell{background:var(--shell);color:var(--shell-text);height:48px;display:flex;
    align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.15)}
  .shell .logo{font-weight:700;font-size:15px;letter-spacing:.3px}
  .shell .divider{width:1px;height:22px;background:rgba(255,255,255,.25)}
  .shell .app-name{font-size:14px;opacity:.9}
  .shell .spacer{flex:1}
  .shell .pill{font-size:11px;background:rgba(255,255,255,.14);padding:3px 10px;border-radius:12px}
  /* content */
  .content{padding:24px 28px;max-width:1400px;margin:0 auto}
  .flow{color:var(--muted);font-size:13px;margin:0 0 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .flow .step{background:#fff;border:1px solid var(--border);border-radius:16px;padding:3px 12px;font-weight:600;color:var(--text)}
  .flow .arrow{color:var(--blue)}
  .section-head{display:flex;align-items:center;gap:8px;margin:26px 0 12px}
  .section-head h2{font-size:15px;font-weight:700;margin:0}
  .section-head .dot{width:8px;height:8px;border-radius:50%}
  .dot-live{background:var(--good)} .dot-sample{background:var(--muted)}
  .section-head .count{font-size:12px;color:var(--muted);font-weight:400}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;
    box-shadow:0 1px 4px rgba(0,0,0,.06);transition:box-shadow .15s}
  .card:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
  .row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px}
  .title{font-weight:700;font-size:14px;line-height:1.4}
  .title .iflow{color:var(--muted);font-weight:400}
  /* Fiori ObjectStatus pill */
  .badge{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap}
  .P1{background:var(--bad-bg);color:var(--bad)} .P2{background:var(--warn-bg);color:var(--warn)} .P3{background:var(--good-bg);color:var(--good)}
  .msg{color:var(--text);font-size:12px;font-family:"SF Mono",Consolas,Menlo,monospace;line-height:1.55;
    background:var(--code-bg);border:1px solid var(--code-border);padding:10px;border-radius:8px;margin:10px 0;
    word-break:break-word;max-height:96px;overflow-y:auto}
  button{background:var(--blue);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;
    font-size:13px;font-weight:700;font-family:inherit}
  button:hover{background:var(--blue-dark)}
  button:disabled{opacity:.5;cursor:wait}
  .result{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:13px;display:none}
  .kv{display:flex;justify-content:space-between;margin:6px 0;gap:12px}
  .kv b{color:var(--muted);font-weight:600;white-space:nowrap} .kv span{color:var(--text);text-align:right}
  .status{font-weight:700}
  .approved{color:var(--good)} .human{color:var(--warn)}
  .conf-wrap{margin:8px 0 4px}
  .conf-bar{height:8px;background:#ededed;border-radius:4px;overflow:hidden;margin-top:5px}
  .conf-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .5s ease}
  .steps{margin:8px 0 4px;padding-left:20px;color:var(--text)}
  .steps li{margin-bottom:4px}
  .risk{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-left:8px}
  .risk-LOW{background:var(--good-bg);color:var(--good)} .risk-MEDIUM{background:var(--warn-bg);color:var(--warn)} .risk-HIGH{background:var(--bad-bg);color:var(--bad)}
  .trace{font-family:"SF Mono",Consolas,Menlo,monospace;font-size:11px;color:var(--muted);margin-top:10px;
    white-space:pre-wrap;background:var(--code-bg);border:1px solid var(--code-border);padding:10px;border-radius:8px}
  .report-toggle{background:none;color:var(--blue);padding:4px 0;font-size:12px;font-weight:700;margin-top:12px}
  .report-toggle:hover{background:none;text-decoration:underline}
  .report{display:none;font-family:"SF Mono",Consolas,Menlo,monospace;font-size:11px;color:var(--text);
    white-space:pre-wrap;background:var(--code-bg);border:1px solid var(--code-border);padding:12px;border-radius:8px;
    margin-top:8px;max-height:420px;overflow-y:auto}
  .empty{color:var(--muted);font-size:13px}

  /* Execute / teach panels */
  .action-panel{margin-top:14px;padding-top:14px;border-top:1px dashed var(--border-strong)}
  .action-panel .hint{font-size:11px;color:var(--muted);margin:0 0 8px}
  button.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}
  button.secondary:hover{background:#f0f6fd}
  .exec-outcome{margin-top:10px;padding:10px;border-radius:8px;font-size:12.5px}
  .exec-good{background:var(--good-bg);color:var(--good)}
  .exec-warn{background:var(--warn-bg);color:var(--warn)}
  .exec-bad{background:var(--bad-bg);color:var(--bad)}
  .teach-form label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  .teach-form textarea, .teach-form input{width:100%;font-family:inherit;font-size:12.5px;padding:8px;
    border:1px solid var(--border-strong);border-radius:6px;color:var(--text);resize:vertical}
  .teach-form textarea{min-height:56px}
  .teach-outcome{margin-top:10px;font-size:12.5px}
</style>
</head>
<body>
  <div class="shell">
    <span class="logo">SAP IntelliOps</span>
    <span class="divider"></span>
    <span class="app-name">Multi-Agent Incident Resolver</span>
    <span class="spacer"></span>
    <span class="pill">SAP Cloud Integration · Trial</span>
  </div>

  <div class="content">
    <div class="flow">
      <span class="step">Monitor</span><span class="arrow">→</span>
      <span class="step">Diagnosis (RAG)</span><span class="arrow">→</span>
      <span class="step">Remediation</span><span class="arrow">→</span>
      <span class="step">Reporting</span>
    </div>

    <div class="section-head">
      <span class="dot dot-live"></span>
      <h2>Live Incidents</h2>
      <span class="count" id="live-count">— pulled from your SAP CPI tenant</span>
    </div>
    <div id="grid-live" class="grid"><div class="card empty">Loading live incidents…</div></div>

    <div class="section-head">
      <span class="dot dot-sample"></span>
      <h2>Sample Incidents</h2>
      <span class="count">canned demo data</span>
    </div>
    <div id="grid-sample" class="grid"><div class="card empty">Loading sample incidents…</div></div>
  </div>

<script>
const API = window.location.origin;

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toggleReport(id){
  const el = document.getElementById(`report-${id}`);
  const btn = document.getElementById(`report-btn-${id}`);
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '▾ View full postmortem report' : '▴ Hide full postmortem report';
}

function renderGrid(gridId, incidents, emptyText){
  const grid = document.getElementById(gridId);
  if (!incidents.length){
    grid.innerHTML = `<div class="card empty">${emptyText}</div>`;
    return;
  }
  grid.innerHTML = incidents.map(inc => `
    <div class="card" id="card-${inc.incident_id}">
      <div class="row">
        <div class="title">${escapeHtml(inc.incident_id)} <span class="iflow">— ${escapeHtml(inc.iflow)}</span></div>
        <span class="badge ${inc.severity}">${escapeHtml(inc.severity)}</span>
      </div>
      <div class="msg">${escapeHtml(inc.error_type)}: ${escapeHtml(inc.message)}</div>
      <button onclick='resolveIncident(${JSON.stringify(JSON.stringify(inc))})'>▶ Run Agent Pipeline</button>
      <div class="result" id="result-${inc.incident_id}"></div>
    </div>
  `).join('');
}

async function loadIncidents(){
  const [liveRes, sampleRes] = await Promise.all([
    fetch(`${API}/incidents/live`),
    fetch(`${API}/incidents/sample`),
  ]);
  const live = await liveRes.json();
  document.getElementById('live-count').textContent =
    live.length ? `${live.length} pulled from your SAP CPI tenant` : '— pulled from your SAP CPI tenant';
  renderGrid('grid-live', live, 'No live incidents yet — trigger a failure in your SAP CPI tenant, then run "python -m connectors.sap_cpi" and refresh this page.');
  renderGrid('grid-sample', await sampleRes.json(), 'No sample incidents found.');
}

const lastResults = {};   // incident_id -> {incident, resolveData} — used by execute/teach handlers

async function resolveIncident(incJson){
  const inc = JSON.parse(incJson);
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Running agents…';
  const res = await fetch(`${API}/resolve`, {method:'POST', headers:{'Content-Type':'application/json'}, body: incJson});
  const data = await res.json();
  btn.disabled = false; btn.textContent = '↻ Re-run';
  const box = document.getElementById(`result-${inc.incident_id}`);
  box.style.display = 'block';
  if (data.error){
    box.innerHTML = `<div class="kv"><b>Status</b><span class="status human">⚠ ${escapeHtml(data.error)}</span></div>`;
    return;
  }
  lastResults[inc.incident_id] = {incident: inc, data};

  const statusClass = data.auto_approved ? 'approved' : 'human';
  const statusText = data.auto_approved ? '✔ Auto-approved' : '⚠ Needs human review';
  const stepsHtml = (data.remediation.steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');

  let actionPanel = '';
  if (data.auto_approved){
    actionPanel = `
      <div class="action-panel">
        <p class="hint">This only attempts a safe restart-and-observe mitigation — it does not itself rotate
        credentials, patch code, or perform architecture changes. Those still require the manual steps above.</p>
        <button class="secondary" id="exec-btn-${inc.incident_id}" onclick="executeMitigation('${inc.incident_id}')">⚙ Attempt Safe Mitigation (redeploy + verify)</button>
        <div id="exec-outcome-${inc.incident_id}"></div>
      </div>`;
  } else {
    const stepsPrefill = (data.remediation.steps || []).join('\n');
    actionPanel = `
      <div class="action-panel teach-form">
        <p class="hint">If you've confirmed the real fix for this, teach it — the next similar incident will
        be recognized automatically instead of being escalated again.</p>
        <label>Confirmed root cause</label>
        <textarea id="teach-cause-${inc.incident_id}">${escapeHtml(data.diagnosis.root_cause)}</textarea>
        <label>Action code (short, e.g. FIX_SCRIPT_BUG)</label>
        <input id="teach-action-${inc.incident_id}" placeholder="e.g. FIX_SCRIPT_BUG">
        <label>Remediation steps (one per line)</label>
        <textarea id="teach-steps-${inc.incident_id}">${escapeHtml(stepsPrefill)}</textarea>
        <button class="secondary" style="margin-top:10px" onclick="submitFeedback('${inc.incident_id}')">✎ Confirm fix &amp; teach</button>
        <div id="teach-outcome-${inc.incident_id}" class="teach-outcome"></div>
      </div>`;
  }

  box.innerHTML = `
    <div class="kv"><b>Priority score</b><span>${data.priority_score}</span></div>
    <div class="kv"><b>Root cause</b><span>${escapeHtml(data.diagnosis.root_cause)}</span></div>
    <div class="conf-wrap">
      <div class="kv"><b>Confidence</b><span>${(data.diagnosis.confidence*100).toFixed(0)}%</span></div>
      <div class="conf-bar"><div class="conf-fill" style="width:${data.diagnosis.confidence*100}%"></div></div>
    </div>
    <div class="kv"><b>Recommended action</b><span>${escapeHtml(data.remediation.action)}<span class="risk risk-${data.remediation.risk}">${escapeHtml(data.remediation.risk)} RISK</span></span></div>
    <ol class="steps">${stepsHtml}</ol>
    <div class="kv"><b>Status</b><span class="status ${statusClass}">${statusText}</span></div>
    <div class="trace">${data.trace.map(escapeHtml).join('\n')}</div>
    <button class="report-toggle" id="report-btn-${inc.incident_id}" onclick="toggleReport('${inc.incident_id}')">▾ View full postmortem report</button>
    <div class="report" id="report-${inc.incident_id}">${escapeHtml(data.report_markdown)}</div>
    ${actionPanel}
  `;
}

async function executeMitigation(incidentId){
  const {incident, data} = lastResults[incidentId];
  const btn = document.getElementById(`exec-btn-${incidentId}`);
  const outcomeEl = document.getElementById(`exec-outcome-${incidentId}`);
  btn.disabled = true; btn.textContent = 'Redeploying and verifying… (can take up to a few minutes)';
  outcomeEl.innerHTML = '';
  const res = await fetch(`${API}/execute`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
    incident_id: incidentId, iflow: incident.iflow,
    confidence: data.diagnosis.confidence, risk: data.remediation.risk, auto_approved: data.auto_approved,
  })});
  const result = await res.json();
  btn.disabled = false; btn.textContent = '⚙ Attempt Safe Mitigation (redeploy + verify)';
  const cls = result.outcome && result.outcome.startsWith('MITIGATED') ? 'exec-good'
            : result.outcome === 'NOT_ELIGIBLE' || result.outcome === 'NOT_EXECUTABLE' ? 'exec-warn' : 'exec-bad';
  const traceHtml = (result.trace || []).map(escapeHtml).join('<br>');
  outcomeEl.innerHTML = `<div class="exec-outcome ${cls}"><b>${escapeHtml(result.outcome || 'UNKNOWN')}</b><br>${escapeHtml(result.detail || '')}${traceHtml ? '<br><br>'+traceHtml : ''}</div>`;
}

async function submitFeedback(incidentId){
  const {incident} = lastResults[incidentId];
  const rootCause = document.getElementById(`teach-cause-${incidentId}`).value.trim();
  const actionCode = document.getElementById(`teach-action-${incidentId}`).value.trim().toUpperCase().replace(/\s+/g, '_');
  const steps = document.getElementById(`teach-steps-${incidentId}`).value.split('\n').map(s => s.trim()).filter(Boolean);
  const outcomeEl = document.getElementById(`teach-outcome-${incidentId}`);
  if (!actionCode || !steps.length){
    outcomeEl.innerHTML = `<span style="color:var(--bad)">Action code and at least one step are required.</span>`;
    return;
  }
  const res = await fetch(`${API}/feedback`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
    incident_id: incidentId, error_type: incident.error_type, message: incident.message,
    root_cause: rootCause, action_code: actionCode, steps,
  })});
  const result = await res.json();
  outcomeEl.innerHTML = `<span style="color:var(--good)">✔ ${escapeHtml(result.detail)}</span>`;
}

loadIncidents();
</script>
</body>
</html>
